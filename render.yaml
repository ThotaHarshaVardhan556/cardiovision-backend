services:
  - type: web
    name: cardiovision-api
    env: python
    buildCommand: pip install --upgrade pip wheel setuptools && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.8
